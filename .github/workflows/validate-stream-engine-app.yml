name: Validate Stream Engine App

on:
  push:
    paths:
      - "repository.yaml"
      - "stream_server/**"
      - ".github/workflows/validate-stream-engine-app.yml"
  pull_request:
    paths:
      - "repository.yaml"
      - "stream_server/**"
      - ".github/workflows/validate-stream-engine-app.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate YAML and shell
        run: |
          python -m pip install --disable-pip-version-check pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [Path("repository.yaml"), *Path("stream_server").rglob("*.yaml")]:
              with path.open(encoding="utf-8") as stream:
                  yaml.safe_load(stream)
              print(f"Validated {path}")
          PY
          bash -n stream_server/run.sh

      - name: Build amd64 app image
        id: docker_build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          docker build \
            --build-arg BUILD_VERSION=0.1.0 \
            --build-arg BUILD_ARCH=amd64 \
            --tag stremio-stream-engine:test \
            stream_server >docker-build.log 2>&1

      - name: Upload Docker build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: docker-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Report Docker build failure
        if: steps.docker_build.outcome == 'failure'
        shell: bash
        run: |
          echo "Docker build failed. Last 120 lines:"
          tail -n 120 docker-build.log
          exit 1

      - name: Inspect image
        if: steps.docker_build.outcome == 'success'
        run: |
          docker image inspect stremio-stream-engine:test >/dev/null
